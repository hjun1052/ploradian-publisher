name: Deploy Worker

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-worker-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Report missing Cloudflare token
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "CLOUDFLARE_API_TOKEN is not configured, so automatic Worker deploy is skipped."
          echo "Add that repository secret to publish generated article commits automatically."

      - name: Check out repository
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm ci

      - name: Deploy Worker and static assets
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy:worker
