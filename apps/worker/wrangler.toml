name = "ploradian-publisher"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
routes = [
  { pattern = "news.ploradian.com", custom_domain = true }
]

[assets]
directory = "../web/dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = ["/run", "/health"]

[placement]
region = "aws:us-east-1"

[observability]
enabled = true
head_sampling_rate = 1.0

[triggers]
crons = ["0 * * * *"]

[vars]
AI_PROVIDER = "openai"
OPENAI_MODEL = "gpt-5.5"
GITHUB_REPO = "hjun1052/ploradian-publisher"
GITHUB_BRANCH = "main"
MAX_ARTICLES_PER_RUN = "1"
DRY_RUN = "false"
SITE_TIMEZONE = "Asia/Seoul"
RSS_FEEDS_JSON = """
